<svg xmlns="http://www.w3.org/2000/svg" width="1404.51" height="1100.00" viewBox="0 0 1404.51 1100.00">
  <title>Softball Field SVG</title>
  <desc>Top-down softball field based on NFHS dimensions, simplified and unlabeled.</desc>

  <!-- Grass -->
  <rect width="1404.51" height="1100.00" fill="#4FA75E"/>

  <!-- Outfield grass fan -->
  <path d="M 80.00 337.75 A 880.00 880.00 0 0 1 1324.51 337.75 L 702.25 960.00 Z" fill="#4FA75E"/>

  <!-- Skinned infield (60' radius from front center of pitcher's plate), clipped to foul lines -->
  <path d="M 702.25 960.00
           L 470.58 728.33
           A 240.00 240.00 0 0 1 933.92 728.33
           Z"
        fill="#C89A63"/>

  <!-- Slightly darker infield arc edge -->
  

  <!-- Fence arc -->
  

  <!-- Foul lines -->
  <line x1="702.25" y1="960.00" x2="80.00" y2="337.75" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="702.25" y1="960.00" x2="1324.51" y2="337.75" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>

  <!-- Base paths (no extra extension lines) -->
  <line x1="702.25" y1="960.00" x2="871.96" y2="790.29" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
  <line x1="532.55" y1="790.29" x2="702.25" y2="960.00" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.95"/>

  <!-- Bases -->
  <rect x="865.96" y="784.29" width="12.00" height="12.00" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1.5" transform="rotate(45 871.96 790.29)"/>
  <rect x="696.25" y="614.59" width="12.00" height="12.00" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1.5" transform="rotate(45 702.25 620.59)"/>
  <rect x="526.55" y="784.29" width="12.00" height="12.00" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1.5" transform="rotate(45 532.55 790.29)"/>

  <!-- Home plate -->
  <polygon points="695.45,946.40 709.05,946.40 709.05,953.20 702.25,960.00 695.45,953.20"
           fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Pitcher's plate and circle -->
  <circle cx="702.25" cy="788.00" r="32.00" fill="#C89A63" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="6 6" opacity="0.9"/>
  <rect x="690.25" y="785.00" width="24.00" height="6.00" fill="#C89A63" stroke="#FFFFFF" stroke-width="1.2"/>

  <!-- Batter's boxes and catcher's box -->
  <rect x="681.42" y="934.00" width="16.00" height="24.00" fill="#C89A63" stroke="#FFFFFF" stroke-width="2"/>
  <rect x="707.09" y="934.00" width="16.00" height="24.00" fill="#C89A63" stroke="#FFFFFF" stroke-width="2"/>
  <rect x="682.25" y="959.20" width="40.00" height="33.67" fill="#C89A63" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M 80.00 337.75 A 880.00 880.00 0 0 1 1324.51 337.75" stroke="#000000" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
